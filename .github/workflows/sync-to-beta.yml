name: Sync Source To Beta Repo

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Repo
        uses: actions/checkout@v4

      - name: Clone Build_Beta_BTG
        run: |
          git clone https://x-access-token:${{ secrets.BUILD_REPO_TOKEN }}@github.com/UmaTechspire/Build_Beta_BTG.git beta

      - name: Sync Files
        run: |
          rsync -av --delete \
            --exclude='beta' \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.vs' \
            --exclude='node_modules' \
            --exclude='venv' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='React/build' \
            --exclude='API/UserPanel/publish' \
            ./ beta/
      
      - name: Commit And Push
        run: |
          cd beta

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git remote set-url origin https://x-access-token:${{ secrets.BUILD_REPO_TOKEN }}@github.com/UmaTechspire/Build_Beta_BTG.git

          git add .

          git commit -m "UPDATED-$(TZ='Asia/Kolkata' date +'%d-%m-%Y- %H:%M:%S')" || exit 0

          git push origin main
